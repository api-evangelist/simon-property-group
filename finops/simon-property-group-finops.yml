meters:
  - name: contractual_partnership
    description: Partner cost is governed by the underlying lease or marketing agreement, not by
      per-API-call meters.
    unit: varies
    aggregation: sum
principles:
  - name: Visibility
    description: Spend visibility comes from the AP/finance system that processes lease and marketing
      invoices, not from a usage API.
  - name: Allocation
    description: Allocate via the originating lease, store, or campaign captured in the partner's
      financial system; tag integration traffic with the contract reference.
  - name: Optimization
    description: Optimization is contractual — renegotiate marketing or co-tenancy terms and consolidate
      duplicate integrations rather than tuning request volume.
  - name: Accountability
    description: Real-estate, retail-marketing, and brand teams own the Simon partnership; integration
      teams own technical SLA conformance.
