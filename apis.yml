aid: simon-property-group
name: Simon Property Group
description: >-
  Simon Property Group is the largest retail real estate investment trust (REIT) in
  the United States, owning, developing, and managing premier shopping, dining,
  entertainment, and mixed-use destinations. Simon's portfolio includes an interest
  in 254 properties: traditional malls, premium outlets, Mills centers, lifestyle
  centers, and other retail properties in North America, Europe, and Asia. The company
  operates ShopSimon, an e-commerce platform, and Simon Innovation Group to advance
  retail technology innovation. Simon had trailing twelve-month revenue of approximately
  $6.36 billion as of 2025 and a market capitalization of approximately $67 billion.
