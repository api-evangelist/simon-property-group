apis:
  - aid: simon-property-group:shopsimon
    name: ShopSimon Retailer API
    description: >-
      ShopSimon is Simon's e-commerce platform integrating online and offline retail.
      The ShopSimon Retailer Hub provides APIs for sellers to integrate product
      listings, inventory data, and order management with the ShopSimon marketplace.
      The platform facilitates product catalog sync, offer management, and order
      fulfillment for retail partners selling on ShopSimon.
    humanURL: https://sellersupport.shopsimon.com/
